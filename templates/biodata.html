<!DOCTYPE html>
<html>
<head>
    <title>Bio Data Form - YouthsNikah</title>
    <style>
        fieldset { margin-bottom: 20px; padding: 15px; }
        legend { font-weight: bold; }
        label { display:block; margin-top:8px; }
        input, select, textarea { width: 100%; padding: 5px; margin-top:4px; }
    </style>
</head>
<body>

<h2>Spouse Profile (Bio Data)</h2>

<a href="/dashboard">Back to Dashboard</a><br><br>

<form method="POST">

<fieldset>
    <legend>Basic Information</legend>

    <label>Gender:</label>
    <select name="gender" required>
        <option value="">Select</option>
        <option value="Male" {% if biodata and biodata['gender']=='Male' %}selected{% endif %}>Male</option>
        <option value="Female" {% if biodata and biodata['gender']=='Female' %}selected{% endif %}>Female</option>
    </select>

    <label>District:</label>
    <input type="text" name="district" value="{{ biodata['district'] if biodata else '' }}" required>

    <label>Current Age:</label>
    <input type="number" name="current_age" value="{{ biodata['current_age'] if biodata else '' }}" required>

    <label>Marital Status:</label>
    <select name="marital_status" required>
        <option value="">Select</option>
        <option value="Single" {% if biodata and biodata['marital_status']=='Single' %}selected{% endif %}>Single</option>
        <option value="Divorced" {% if biodata and biodata['marital_status']=='Divorced' %}selected{% endif %}>Divorced</option>
        <option value="Widow/Widower" {% if biodata and biodata['marital_status']=='Widow/Widower' %}selected{% endif %}>Widow/Widower</option>
    </select>
</fieldset>

<fieldset>
    <legend>Personal Information</legend>

    <label>Father's Occupation / Status:</label>
    <input type="text" name="father_occupation" value="{{ biodata['father_occupation'] if biodata else '' }}">

    <label>Mother's Occupation / Status:</label>
    <input type="text" name="mother_occupation" value="{{ biodata['mother_occupation'] if biodata else '' }}">

    <label>Permanent Address:</label>
    <textarea name="permanent_address">{{ biodata['permanent_address'] if biodata else '' }}</textarea>

    <label>Current Address:</label>
    <textarea name="current_address">{{ biodata['current_address'] if biodata else '' }}</textarea>

    <label>Date of Birth:</label>
    <input type="date" name="date_of_birth" value="{{ biodata['date_of_birth'] if biodata else '' }}">

    <label>Height:</label>
    <input type="text" name="height" value="{{ biodata['height'] if biodata else '' }}">

    <label>Weight:</label>
    <input type="text" name="weight" value="{{ biodata['weight'] if biodata else '' }}">

    <label>Blood Group:</label>
    <input type="text" name="blood_group" value="{{ biodata['blood_group'] if biodata else '' }}">

    <label>Skin Tone:</label>
    <input type="text" name="skin_tone" value="{{ biodata['skin_tone'] if biodata else '' }}">

    <label>Educational Qualification:</label>
    <input type="text" name="educational_qualification" value="{{ biodata['educational_qualification'] if biodata else '' }}">

    <label>Profession:</label>
    <input type="text" name="profession" value="{{ biodata['profession'] if biodata else '' }}">

    <label>Political View:</label>
    <input type="text" name="political_view" value="{{ biodata['political_view'] if biodata else '' }}">

    <label>Religion:</label>
    <input type="text" name="religion" value="{{ biodata['religion'] if biodata else '' }}">

    <label>About Yourself:</label>
    <textarea name="about_yourself">{{ biodata['about_yourself'] if biodata else '' }}</textarea>
</fieldset>

<fieldset>
    <legend>Family Information</legend>

    <label>Financial Status:</label>
    <input type="text" name="financial_status" value="{{ biodata['financial_status'] if biodata else '' }}">

    <label>Social Status:</label>
    <input type="text" name="social_status" value="{{ biodata['social_status'] if biodata else '' }}">

    <label>Brothers:</label>
    <textarea name="brothers">{{ biodata['brothers'] if biodata else '' }}</textarea>

    <label>Sisters:</label>
    <textarea name="sisters">{{ biodata['sisters'] if biodata else '' }}</textarea>

    <label>Paternal Uncles:</label>
    <textarea name="paternal_uncles">{{ biodata['paternal_uncles'] if biodata else '' }}</textarea>

    <label>Maternal Uncles:</label>
    <textarea name="maternal_uncles">{{ biodata['maternal_uncles'] if biodata else '' }}</textarea>
</fieldset>

<fieldset>
    <legend>Religious & Lifestyle</legend>

    <label>View on Marriage:</label>
    <input type="text" name="view_on_marriage" value="{{ biodata['view_on_marriage'] if biodata else '' }}">

    <label>Maintains Fardh Covering:</label>
    <select name="fardh_covering">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['fardh_covering']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['fardh_covering']=='N' %}selected{% endif %}>N</option>
    </select>

    <label>Maintains Distance from Non-Mahram:</label>
    <select name="distance_non_mahrams">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['distance_non_mahrams']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['distance_non_mahrams']=='N' %}selected{% endif %}>N</option>
        <option value="I" {% if biodata and biodata['distance_non_mahrams']=='I' %}selected{% endif %}>Improvement needed</option>
    </select>

    <label>Has Sunnah Beard:</label>
    <select name="sunnah_beard">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['sunnah_beard']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['sunnah_beard']=='N' %}selected{% endif %}>N</option>
    </select>

    <label>Watches TV / Listens to Music:</label>
    <select name="tv_music">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['tv_music']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['tv_music']=='N' %}selected{% endif %}>N</option>
        <option value="I" {% if biodata and biodata['tv_music']=='I' %}selected{% endif %}>Improvement needed</option>
    </select>

    <label>Can Recite Qur'an:</label>
    <select name="can_recite_quran">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['can_recite_quran']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['can_recite_quran']=='N' %}selected{% endif %}>N</option>
        <option value="I" {% if biodata and biodata['can_recite_quran']=='I' %}selected{% endif %}>Improvement needed</option>
    </select>

    <label>Any Physical or Mental Conditions:</label>
    <select name="physical_mental_conditions">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['physical_mental_conditions']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['physical_mental_conditions']=='N' %}selected{% endif %}>N</option>
    </select>

    <label>Prays Five Times Daily:</label>
    <select name="prayers_five_times">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['prayers_five_times']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['prayers_five_times']=='N' %}selected{% endif %}>N</option>
    </select>

    <label>Involved in Religious Work:</label>
    <select name="religious_work">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['religious_work']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['religious_work']=='N' %}selected{% endif %}>N</option>
    </select>
</fieldset>

<fieldset>
    <legend>Spouse Expectations</legend>

    <label>Age:</label>
    <input type="text" name="spouse_age" value="{{ biodata['spouse_age'] if biodata else '' }}">

    <label>Skin Tone:</label>
    <input type="text" name="spouse_skin_tone" value="{{ biodata['spouse_skin_tone'] if biodata else '' }}">

    <label>Height:</label>
    <input type="text" name="spouse_height" value="{{ biodata['spouse_height'] if biodata else '' }}">

    <label>Weight:</label>
    <input type="text" name="spouse_weight" value="{{ biodata['spouse_weight'] if biodata else '' }}">

    <label>Educational Qualification:</label>
    <input type="text" name="spouse_education" value="{{ biodata['spouse_education'] if biodata else '' }}">

    <label>District:</label>
    <input type="text" name="spouse_district" value="{{ biodata['spouse_district'] if biodata else '' }}">

    <label>Current Address:</label>
    <textarea name="spouse_address">{{ biodata['spouse_address'] if biodata else '' }}</textarea>

    <label>Profession:</label>
    <input type="text" name="spouse_profession" value="{{ biodata['spouse_profession'] if biodata else '' }}">

    <label>Special Qualities:</label>
    <textarea name="spouse_special_qualities">{{ biodata['spouse_special_qualities'] if biodata else '' }}</textarea>
</fieldset>

<fieldset>
    <legend>Guardian Awareness</legend>

    <label>Does your guardian know about marriage?</label>
    <select name="guardian_marriage">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['guardian_marriage']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['guardian_marriage']=='N' %}selected{% endif %}>N</option>
    </select>

    <label>Does your guardian know about publishing your biodata?</label>
    <select name="guardian_publish">
        <option value="">Select</option>
        <option value="Y" {% if biodata and biodata['guardian_publish']=='Y' %}selected{% endif %}>Y</option>
        <option value="N" {% if biodata and biodata['guardian_publish']=='N' %}selected{% endif %}>N</option>
    </select>
</fieldset>

<button type="submit">Save Bio Data</button>

</form>
</body>
</html>
