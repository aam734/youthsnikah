<!DOCTYPE html>
<html>
<head>
    <title>Bio Data - YouthsNikah</title>

    <style>
        .step { display: none; }
        .step.active { display: block; }

        .progress-bar {
            width: 100%;
            background: #ddd;
            height: 20px;
            margin-bottom: 20px;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: green;
            text-align: center;
            color: white;
        }

        button { margin-top: 15px; }
    </style>
</head>
<body>

<h2>Spouse Profile (Step Form)</h2>

<div class="progress-bar">
    <div class="progress" id="progress">0%</div>
</div>

<form method="POST" id="form">

<!-- STEP 1 -->
<div class="step active">
    <h3>Basic Information</h3>

    <input name="gender" placeholder="Gender" value="{{ biodata['gender'] if biodata else '' }}">
    <input name="district" placeholder="District" value="{{ biodata['district'] if biodata else '' }}">
    <input name="current_age" placeholder="Age" value="{{ biodata['current_age'] if biodata else '' }}">
    <input name="marital_status" placeholder="Marital Status" value="{{ biodata['marital_status'] if biodata else '' }}">

    <button type="button" onclick="nextStep()">Next</button>
</div>

<!-- STEP 2 -->
<div class="step">
    <h3>Personal Information</h3>

    <input name="father_occupation" placeholder="Father" value="{{ biodata['father_occupation'] if biodata else '' }}">
    <input name="mother_occupation" placeholder="Mother" value="{{ biodata['mother_occupation'] if biodata else '' }}">
    <textarea name="current_address">{{ biodata['current_address'] if biodata else '' }}</textarea>

    <button type="button" onclick="prevStep()">Back</button>
    <button type="button" onclick="nextStep()">Next</button>
</div>

<!-- STEP 3 -->
<div class="step">
    <h3>Family Info</h3>

    <textarea name="brothers">{{ biodata['brothers'] if biodata else '' }}</textarea>
    <textarea name="sisters">{{ biodata['sisters'] if biodata else '' }}</textarea>

    <button type="button" onclick="prevStep()">Back</button>
    <button type="button" onclick="nextStep()">Next</button>
</div>

<!-- STEP 4 -->
<div class="step">
    <h3>Religious</h3>

    <input name="prayers_five_times" placeholder="Prays 5 times" value="{{ biodata['prayers_five_times'] if biodata else '' }}">
    <input name="can_recite_quran" placeholder="Quran" value="{{ biodata['can_recite_quran'] if biodata else '' }}">

    <button type="button" onclick="prevStep()">Back</button>
    <button type="button" onclick="nextStep()">Next</button>
</div>

<!-- STEP 5 -->
<div class="step">
    <h3>Spouse Expectations</h3>

    <input name="spouse_age" placeholder="Age" value="{{ biodata['spouse_age'] if biodata else '' }}">
    <input name="spouse_district" placeholder="District" value="{{ biodata['spouse_district'] if biodata else '' }}">

    <button type="button" onclick="prevStep()">Back</button>
    <button type="button" onclick="nextStep()">Next</button>
</div>

<!-- STEP 6 -->
<div class="step">
    <h3>Guardian</h3>

    <input name="guardian_marriage" placeholder="Marriage Awareness" value="{{ biodata['guardian_marriage'] if biodata else '' }}">
    <input name="guardian_publish" placeholder="Publish Awareness" value="{{ biodata['guardian_publish'] if biodata else '' }}">

    <button type="button" onclick="prevStep()">Back</button>
    <button type="submit">Submit</button>
</div>

</form>

<script>
let currentStep = 0;
let steps = document.querySelectorAll(".step");

function showStep(n) {
    steps.forEach((step, i) => {
        step.classList.remove("active");
        if (i === n) step.classList.add("active");
    });

    updateProgress();
}

function nextStep() {
    if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
    }
}

function prevStep() {
    if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
    }
}

function updateProgress() {
    let percent = ((currentStep + 1) / steps.length) * 100;
    let bar = document.getElementById("progress");
    bar.style.width = percent + "%";
    bar.innerText = Math.round(percent) + "%";
}

showStep(currentStep);
</script>

</body>
</html>
