<!DOCTYPE html>
<html>
<head>
    <title>Bio Data Form - YouthsNikah</title>
    <style>
        fieldset { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; }
        legend { font-weight: bold; }
        label { display:block; margin-top:8px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 5px; margin-top:4px; }
        .step { display: none; }
        .step.active { display: block; }

        .progress-bar {
            width: 100%;
            background: #ddd;
            height: 20px;
            margin-bottom: 20px;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: green;
            text-align: center;
            color: white;
            line-height: 20px;
        }

        button { margin-top: 15px; }
    </style>
</head>
<body>

<script>
    function nextStep() {
    if (!validateStep(currentStep)) return; // Step validation

    // Gather current step form data
    const stepFields = steps[currentStep].querySelectorAll("input, select, textarea");
    let formData = {};
    stepFields.forEach(f => formData[f.name] = f.value);

    // Send to server via fetch
    fetch('/save_biodata_step', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(formData)
    });

    // Move to next step
    if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
    }
}
    function updateProgress() {
    const allFields = document.querySelectorAll("input, select, textarea");
    let filled = 0;
    allFields.forEach(f => {
        if (f.value && f.value.trim() !== "") filled++;
    });
    let percent = Math.round((filled / allFields.length) * 100);
    const bar = document.getElementById("progress");
    bar.style.width = percent + "%";
    bar.innerText = percent + "%";
}
    function validateStep(stepIndex) {
    const stepFields = steps[stepIndex].querySelectorAll("input[required], select[required], textarea[required]");
    for (let f of stepFields) {
        if (!f.value || f.value.trim() === "") {
            alert(`Please fill the field: ${f.name}`);
            f.focus();
            return false;
        }
    }
    return true;
}
</script>

<h2>Spouse Profile (Step Form)</h2>

<div class="progress-bar">
    <div class="progress" id="progress">0%</div>
</div>

<form method="POST">

<!-- STEP 1: Basic Information -->

            <option value="Divorced" {{ 'selected' if biodata and biodata['marital_status']=='Divorced' else '' }}>Divorced</option>

</form>

<script>
let currentStep = 0;
let steps = document.querySelectorAll(".step");

function showStep(n) {
    steps.forEach((step, i) => {
        step.classList.remove("active");
        if (i === n) step.classList.add("active");
    });
    updateProgress();
}

function nextStep() {
    if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
    }
}

function prevStep() {
    if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
    }
}

function updateProgress() {
    let percent = ((currentStep + 1) / steps.length) * 100;
    let bar = document.getElementById("progress");
    bar.style.width = percent + "%";
    bar.innerText = Math.round(percent) + "%";
}

showStep(currentStep);
</script>
