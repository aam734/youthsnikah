<h2>Public Spouse Profiles</h2>

{% for p in profiles %}
<div style="border:1px solid black; padding:10px; margin:10px;">
    <p><b>ID:</b> {{ p['profile_id'] }}</p>
    <p>Gender: {{ p['gender'] }}</p>
    <p>District: {{ p['district'] }}</p>
    <p>Age: {{ p['current_age'] }}</p>

    <a href="/profile/{{ p['profile_id'] }}">View Full Profile</a>
</div>
{% endfor %}
