<td>
  <button onclick="openProfile('{{ profile_id }}')">{{ profile_id }}</button>
</td>

<script>
function openProfile(id) {
    const url = `${window.location.origin}/profile/${id}`;
    
    // Copy to clipboard
    navigator.clipboard.writeText(url).then(() => {
        alert('Profile link copied to clipboard!');
    });

    // Open in new tab
    window.open(url, '_blank');
}
</script>

<h2>Your Profile</h2>

{% if biodata %}
<p><b>Profile ID:</b> {{ biodata['profile_id'] }}</p>
<p><b>Gender:</b> {{ biodata['gender'] }}</p>
<p><b>District:</b> {{ biodata['district'] }}</p>
<p><b>Age:</b> {{ biodata['current_age'] }}</p>

<a href="/biodata">Edit Profile</a>
<br><br>
<a href="/dashboard">Back to Dashboard</a>
{% else %}
<p>No biodata found.</p>
<a href="/biodata">Create Now</a>
{% endif %}
