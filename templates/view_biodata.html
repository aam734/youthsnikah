<h2>Your Profile</h2>

{% if biodata %}
<p><b>Profile ID:</b>
<td>
  <button onclick="openProfile('{{ biodata['profile_id'] }}')">
    {{ biodata['profile_id'] }}
  </button>
</td>
</p>

<p><b>Gender:</b> {{ biodata['gender'] }}</p>
<p><b>District:</b> {{ biodata['district'] }}</p>
<p><b>Age:</b> {{ biodata['current_age'] }}</p>

<a href="/biodata">Edit Profile</a>
<br><br>
<a href="/dashboard">Back to Dashboard</a>

<script>
function openProfile(profile_id) {
    const url = `${window.location.origin}/profile/${profile_id}`;
    
    // Copy to clipboard
    navigator.clipboard.writeText(url).then(() => {
        alert('Profile link copied to clipboard!');
    });

    // Open in new tab
    window.open(url, '_blank');
}
</script>

{% else %}
<p>No biodata found.</p>
<a href="/biodata">Create Now</a>
{% endif %}
